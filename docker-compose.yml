services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  guess-game:
    build: .
    container_name: guess-game
    depends_on:
      - ollama
    stdin_open: true
    tty: true
    environment:
      AI_BASE_URL: http://ollama:11434
      AI_MODEL: llama3.2

volumes:
  ollama: